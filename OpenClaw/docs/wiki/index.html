<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki - OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.png">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/top-header.css">
    <link rel="stylesheet" href="/css/auth-modal.css">
    <link rel="stylesheet" href="wiki.css">
    <style>
        .wiki-wrapper {
            display: flex;
            min-height: calc(100vh - 48px);
        }

        /* Sidebar */
        .wiki-sidebar {
            width: 280px;
            background: var(--bg-secondary, #1a1a2e);
            color: var(--text-primary, #fff);
            padding: 20px 0;
            position: fixed;
            top: 48px;
            height: calc(100vh - 48px);
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle, #333);
        }

        .wiki-sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-subtle, #333);
        }

        .wiki-sidebar-header h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-primary, #fff);
        }

        .lang-switch {
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: var(--primary-color, #4a69bd);
            color: #fff;
        }

        .lang-btn:not(.active) {
            background: var(--bg-tertiary, #333);
            color: var(--text-muted, #aaa);
        }

        .lang-btn:hover:not(.active) {
            background: var(--border-color, #444);
        }

        .wiki-nav-section {
            padding: 20px;
        }

        .wiki-nav-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted, #888);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .wiki-nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .wiki-nav-item {
            margin-bottom: 5px;
        }

        .wiki-nav-link {
            display: block;
            padding: 10px 15px;
            color: var(--text-secondary, #ccc);
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .wiki-nav-link:hover {
            background: var(--bg-tertiary, #333);
            color: var(--text-primary, #fff);
        }

        .wiki-nav-link.active {
            background: var(--primary-color, #4a69bd);
            color: #fff;
        }

        /* Main content */
        .wiki-main-content {
            flex: 1;
            margin-left: 280px;
            background: var(--bg-color, #fff);
        }

        .wiki-content-frame {
            width: 100%;
            height: calc(100vh - 48px);
            border: none;
        }

        /* Loading state */
        .wiki-loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted, #666);
        }

        .mode-indicator {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 10px;
            display: inline-block;
        }

        .mode-static {
            background: #27ae60;
            color: #fff;
        }

        .mode-dynamic {
            background: #f39c12;
            color: #fff;
        }

        /* Dark theme adjustments for wiki content frame */
        [data-theme="dark"] .wiki-main-content {
            background: var(--bg-primary, #212121);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .wiki-sidebar {
                width: 100%;
                position: relative;
                top: 0;
                height: auto;
            }

            .wiki-main-content {
                margin-left: 0;
            }

            .wiki-wrapper {
                flex-direction: column;
            }

            .wiki-content-frame {
                height: calc(100vh - 250px);
            }
        }
    </style>
</head>
<body>
    <!-- Top header will be injected by top-header.js -->

    <div class="wiki-wrapper">
        <nav class="wiki-sidebar">
            <div class="wiki-sidebar-header">
                <h1>OpenClaw Wiki</h1>
                <div class="lang-switch">
                    <button class="lang-btn active" data-lang="en">English</button>
                    <button class="lang-btn" data-lang="zh">中文</button>
                </div>
                <span class="mode-indicator" id="mode-indicator"></span>
            </div>
            <div class="wiki-nav-section">
                <h3>Documentation</h3>
                <ul class="wiki-nav-list" id="nav-list">
                    <li class="wiki-nav-item"><span class="wiki-loading">Loading...</span></li>
                </ul>
            </div>
        </nav>

        <main class="wiki-main-content">
            <iframe class="wiki-content-frame" id="content-frame" src="about:blank"></iframe>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/auth-modal.js"></script>
    <script src="/js/top-header.js"></script>
    <script>
        let currentLang = 'en';
        let currentDocId = null;
        let manifest = null;
        let useStaticMode = false;

        async function init() {
            try {
                const response = await fetch('manifest.json');
                if (response.ok) {
                    manifest = await response.json();
                    useStaticMode = true;
                    setModeIndicator('Static', 'mode-static');
                } else {
                    throw new Error('No manifest');
                }
            } catch {
                manifest = {
                    en: [
                        { id: 'GUIDE', title: 'Learning Guide', path: 'en/GUIDE.md' },
                        { id: '00-weda-core-overview', title: 'WEDA Core Overview', path: 'en/00-weda-core-overview.md' },
                        { id: '01-domain-layer', title: 'Domain Layer', path: 'en/01-domain-layer.md' },
                        { id: '02-application-layer', title: 'Application Layer', path: 'en/02-application-layer.md' },
                        { id: '03-infrastructure-layer', title: 'Infrastructure Layer', path: 'en/03-infrastructure-layer.md' },
                        { id: '04-api-layer', title: 'API Layer', path: 'en/04-api-layer.md' }
                    ],
                    zh: [
                        { id: 'GUIDE', title: '學習指南', path: 'zh/GUIDE.md' },
                        { id: '00-weda-core-overview', title: 'WEDA Core 概觀', path: 'zh/00-weda-core-overview.md' },
                        { id: '01-domain-layer', title: 'Domain 層', path: 'zh/01-domain-layer.md' },
                        { id: '02-application-layer', title: 'Application 層', path: 'zh/02-application-layer.md' },
                        { id: '03-infrastructure-layer', title: 'Infrastructure 層', path: 'zh/03-infrastructure-layer.md' },
                        { id: '04-api-layer', title: 'API 層', path: 'zh/04-api-layer.md' }
                    ]
                };
                useStaticMode = false;
                setModeIndicator('Dynamic', 'mode-dynamic');
            }
            renderNav();
            loadFirstDoc();
        }

        function setModeIndicator(text, className) {
            const indicator = document.getElementById('mode-indicator');
            indicator.textContent = text;
            indicator.className = 'mode-indicator ' + className;
        }

        function renderNav() {
            const navList = document.getElementById('nav-list');
            const docs = manifest[currentLang] || [];
            navList.innerHTML = docs.map(doc => `
                <li class="wiki-nav-item">
                    <a href="#" class="wiki-nav-link" data-id="${doc.id}" data-path="${doc.path}">
                        ${doc.title}
                    </a>
                </li>
            `).join('');
            navList.querySelectorAll('.wiki-nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadDocument(link.dataset.id, link.dataset.path);
                });
            });
        }

        function loadFirstDoc() {
            const docs = manifest[currentLang] || [];
            if (docs.length > 0) {
                loadDocument(docs[0].id, docs[0].path);
            }
        }

        function loadDocument(docId, path) {
            currentDocId = docId;
            updateActiveNav();
            const frame = document.getElementById('content-frame');
            if (useStaticMode) {
                frame.src = path;
            } else {
                frame.srcdoc = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <link rel="stylesheet" href="wiki.css">
                        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
                    </head>
                    <body>
                        <article class="markdown-body" id="content">
                            <div style="text-align:center;padding:40px;color:#666;">Loading...</div>
                        </article>
                        <script>
                            (async () => {
                                try {
                                    const res = await fetch('${path}');
                                    if (!res.ok) throw new Error('Not found');
                                    let text = await res.text();
                                    text = text.replace(/^---[\\s\\S]*?---\\n*/m, '');
                                    document.getElementById('content').innerHTML = marked.parse(text);
                                } catch (e) {
                                    document.getElementById('content').innerHTML =
                                        '<div style="text-align:center;padding:40px;color:#666;">' +
                                        '<h2>Document not found</h2>' +
                                        '<p>Run WikiGenerator to generate static files.</p>' +
                                        '</div>';
                                }
                            })();
                        <\/script>
                    </body>
                    </html>
                `;
            }
        }

        function updateActiveNav() {
            document.querySelectorAll('.wiki-nav-link').forEach(link => {
                link.classList.toggle('active', link.dataset.id === currentDocId);
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                document.querySelectorAll('.lang-btn').forEach(b => {
                    b.classList.toggle('active', b === btn);
                });
                renderNav();
                const docs = manifest[currentLang] || [];
                const sameDoc = docs.find(d => d.id === currentDocId);
                if (sameDoc) {
                    loadDocument(sameDoc.id, sameDoc.path);
                } else {
                    loadFirstDoc();
                }
            });
        });

        init();
    </script>
</body>
</html>
