<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.png">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .reset-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .reset-card h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .reset-card .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 0 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .password-hint {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) { opacity: 0.9; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .message {
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .message:empty { display: none; }
        .message.error { color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .message.success { color: #27ae60; background: rgba(39, 174, 96, 0.1); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
        }

        .back-link:hover { color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="reset-card">
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below.</p>

        <div class="message" id="message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required placeholder="At least 8 characters" minlength="8" autocomplete="new-password">
                <div class="password-hint">Must include uppercase, lowercase, digit, and special character</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter your password" autocomplete="new-password">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
        </form>

        <a href="/" class="back-link">Back to home</a>
    </div>

    <script>
        // Apply theme
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme !== 'dark') document.documentElement.setAttribute('data-theme', theme);

        const token = new URLSearchParams(window.location.search).get('token');
        const form = document.getElementById('resetForm');
        const msg = document.getElementById('message');
        const btn = document.getElementById('submitBtn');

        if (!token) {
            msg.textContent = 'Invalid reset link. No token provided.';
            msg.className = 'message error';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.textContent = '';
            msg.className = 'message';

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                msg.textContent = 'Passwords do not match.';
                msg.className = 'message error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await res.json();

                if (!res.ok) {
                    let errorMsg = data.detail || data.title || 'Reset failed';
                    if (data.errors) {
                        const messages = Object.values(data.errors).flat();
                        if (messages.length > 0) errorMsg = messages.join('. ');
                    }
                    throw new Error(errorMsg);
                }

                msg.textContent = data.message || 'Password reset successfully!';
                msg.className = 'message success';
                form.style.display = 'none';

                // Redirect to home after delay
                setTimeout(() => { window.location.href = '/'; }, 3000);

            } catch (err) {
                msg.textContent = err.message;
                msg.className = 'message error';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
