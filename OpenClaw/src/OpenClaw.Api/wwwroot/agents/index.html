<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents - OpenClaw.NET</title>
    <link rel="icon" href="/favicon.png" type="image/svg+xml">
    <link rel="stylesheet" href="/css/top-header.css">
    <link rel="stylesheet" href="/agents/agents.css">
    <link rel="stylesheet" href="/css/auth-modal.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
    <!-- Top header injected by top-header.js -->

    <div class="agents-layout">
        <!-- Sidebar: Agent list -->
        <aside class="agents-sidebar">
            <div class="sidebar-section">
                <h3 class="section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                    </svg>
                    Tools
                </h3>
                <div id="tool-list" class="agent-list"></div>
            </div>
            <div class="sidebar-section">
                <h3 class="section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    Skills
                </h3>
                <div id="skill-list" class="agent-list"></div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="agents-main">
            <!-- Tab bar -->
            <div class="tab-bar">
                <button class="tab active" data-tab="detail">Detail</button>
                <button class="tab" data-tab="dag">DAG View</button>
            </div>

            <!-- Detail panel -->
            <div id="detail-panel" class="panel active">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <p>Select a tool or skill to view details</p>
                </div>
            </div>

            <!-- DAG panel -->
            <div id="dag-panel" class="panel">
                <div id="mermaid-container" class="mermaid-container">
                    <div class="mermaid" id="dag-chart"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/auth-modal.js"></script>
    <script src="/js/top-header.js"></script>
    <script src="/agents/agents.js"></script>
</body>
</html>
