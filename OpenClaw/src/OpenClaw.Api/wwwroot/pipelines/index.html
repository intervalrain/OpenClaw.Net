<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipelines - OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/top-header.css">
    <link rel="stylesheet" href="/css/auth-modal.css">
    <link rel="stylesheet" href="pipelines.css">
</head>
<body>
    <!-- Top header will be injected by top-header.js -->

    <div class="container">
        <div class="page-header">
            <h1>Pipelines</h1>
            <p class="subtitle">Skill Pipeline Automation</p>
        </div>

        <main class="main-content">
            <section class="pipeline-list" id="pipelineList">
                <div class="loading">Loading pipelines...</div>
            </section>

            <section class="execution-panel" id="executionPanel">
                <div class="panel-header">
                    <h2>Executions</h2>
                    <button class="btn btn-secondary" id="clearExecutions">Clear All</button>
                </div>
                <div class="execution-list" id="executionList">
                    <p class="empty-state">No executions yet</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 OpenClaw. All rights reserved.</p>
        </footer>
    </div>

    <!-- Execute Pipeline Modal -->
    <div class="modal" id="executeModal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2 id="modalTitle">Execute Pipeline</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="pipelineDescription" class="pipeline-description"></p>
                <div id="parametersForm" class="parameters-form"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelExecute">Cancel</button>
                <button class="btn btn-primary" id="confirmExecute">Execute</button>
            </div>
        </div>
    </div>

    <!-- Approval Modal -->
    <div class="modal" id="approvalModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Approval Required</h2>
                <button class="close-btn" id="closeApprovalModal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="approvalMessage" class="approval-message"></p>
                <div id="approvalDetails" class="approval-details"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="rejectBtn">Reject</button>
                <button class="btn btn-success" id="approveBtn">Approve</button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/auth-modal.js"></script>
    <script src="/js/top-header.js"></script>
    <script src="pipelines.js"></script>
</body>
</html>
