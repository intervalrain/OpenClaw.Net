<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Banned - OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.png">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .error-container { text-align: center; max-width: 480px; padding: 2rem; }
        .error-icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.75rem; margin: 0 0 0.5rem; }
        .reason { background: var(--card-bg, #1e1e2e); border: 1px solid var(--border-color, #333); border-radius: 8px; padding: 1rem; margin: 1.5rem 0; font-style: italic; color: var(--text-muted, #999); }
        .reason strong { color: #f87171; }
        .actions { margin-top: 2rem; }
        .btn { display: inline-block; padding: 0.6rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: 500; cursor: pointer; border: none; font-size: 0.9rem; }
        .btn-primary { background: var(--primary-color, #4a9eff); color: #fff; }
        .btn-secondary { background: var(--border-color, #333); color: var(--text-color); margin-left: 0.5rem; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🚫</div>
        <h1>Account Banned</h1>
        <p>Your account has been suspended by an administrator.</p>
        <div class="reason" id="ban-reason">
            <strong>Reason:</strong> <span id="reason-text">No reason provided.</span>
        </div>
        <p>If you believe this is a mistake, please contact your administrator.</p>
        <div class="actions">
            <button class="btn btn-primary" id="logout-btn">Sign Out</button>
            <a href="/" class="btn btn-secondary">Home</a>
        </div>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/banned.js"></script>
</body>
</html>
