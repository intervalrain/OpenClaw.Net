<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.png">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .error-container { text-align: center; max-width: 480px; padding: 2rem; }
        .error-code { font-size: 6rem; font-weight: 800; margin: 0; opacity: 0.2; line-height: 1; }
        h1 { font-size: 1.5rem; margin: 0.5rem 0; }
        p { color: var(--text-muted, #999); }
        .btn { display: inline-block; padding: 0.6rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: 500; background: var(--primary-color, #4a9eff); color: #fff; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">:(</div>
        <h1>Something Went Wrong</h1>
        <p>An unexpected error occurred. Please try again later.</p>
        <a href="/" class="btn">Go Home</a>
    </div>
</body>
</html>
