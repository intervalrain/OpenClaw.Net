<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki - OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/top-header.css">
    <link rel="stylesheet" href="/css/auth-modal.css">
    <link rel="stylesheet" href="wiki.css">
    <style>
        .wiki-wrapper {
            display: flex;
            min-height: calc(100vh - 48px);
        }

        /* Sidebar */
        .wiki-sidebar {
            width: 280px;
            background: var(--bg-secondary, #1a1a2e);
            color: var(--text-primary, #fff);
            padding: 20px 0;
            position: fixed;
            top: 48px;
            height: calc(100vh - 48px);
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle, #333);
        }

        .wiki-sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-subtle, #333);
        }

        .wiki-sidebar-header h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-primary, #fff);
        }

        .lang-switch {
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: var(--primary-color, #4a69bd);
            color: #fff;
        }

        .lang-btn:not(.active) {
            background: var(--bg-tertiary, #333);
            color: var(--text-muted, #aaa);
        }

        .lang-btn:hover:not(.active) {
            background: var(--border-color, #444);
        }

        .wiki-nav-section {
            padding: 20px;
        }

        .wiki-nav-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted, #888);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .wiki-nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .wiki-nav-item {
            margin-bottom: 5px;
        }

        .wiki-nav-link {
            display: block;
            padding: 10px 15px;
            color: var(--text-secondary, #ccc);
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .wiki-nav-link:hover {
            background: var(--bg-tertiary, #333);
            color: var(--text-primary, #fff);
        }

        .wiki-nav-link.active {
            background: var(--primary-color, #4a69bd);
            color: #fff;
        }

        /* Main content */
        .wiki-main-content {
            flex: 1;
            margin-left: 280px;
            background: var(--bg-color, #fff);
        }

        .wiki-content-frame {
            width: 100%;
            height: calc(100vh - 48px);
            border: none;
        }

        /* Loading state */
        .wiki-loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted, #666);
        }

        .mode-indicator {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 10px;
            display: inline-block;
        }

        .mode-static {
            background: #27ae60;
            color: #fff;
        }

        .mode-dynamic {
            background: #f39c12;
            color: #fff;
        }

        /* Dark theme adjustments for wiki content frame */
        [data-theme="dark"] .wiki-main-content {
            background: var(--bg-primary, #212121);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .wiki-sidebar {
                width: 100%;
                position: relative;
                top: 0;
                height: auto;
            }

            .wiki-main-content {
                margin-left: 0;
            }

            .wiki-wrapper {
                flex-direction: column;
            }

            .wiki-content-frame {
                height: calc(100vh - 250px);
            }
        }
    </style>
</head>
<body>
    <!-- Top header will be injected by top-header.js -->

    <div class="wiki-wrapper">
        <nav class="wiki-sidebar">
            <div class="wiki-sidebar-header">
                <h1>OpenClaw Wiki</h1>
                <div class="lang-switch">
                    <button class="lang-btn active" data-lang="en">English</button>
                    <button class="lang-btn" data-lang="zh">中文</button>
                </div>
                <span class="mode-indicator" id="mode-indicator"></span>
            </div>
            <div class="wiki-nav-section">
                <h3>Documentation</h3>
                <ul class="wiki-nav-list" id="nav-list">
                    <li class="wiki-nav-item"><span class="wiki-loading">Loading...</span></li>
                </ul>
            </div>
        </nav>

        <main class="wiki-main-content">
            <iframe class="wiki-content-frame" id="content-frame" src="about:blank"></iframe>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/auth-modal.js"></script>
    <script src="/js/top-header.js"></script>
    <script src="wiki.js"></script>
</body>
</html>
